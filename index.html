<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Banana Tennis Runner</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #1a1a2e;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }
        #gameContainer {
            position: relative;
            width: 900px;
            height: 500px;
        }
        canvas {
            display: block;
            border-radius: 12px;
            box-shadow: 0 0 40px rgba(255, 215, 0, 0.3);
        }
        #ui-overlay {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
        }
        #score {
            position: absolute;
            top: 16px; right: 20px;
            color: #fff;
            font-size: 24px;
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }
        #highScore {
            position: absolute;
            top: 46px; right: 20px;
            color: #ffd700;
            font-size: 14px;
            font-weight: bold;
            text-shadow: 1px 1px 3px rgba(0,0,0,0.5);
        }
        #startScreen, #gameOverScreen {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: rgba(0,0,0,0.6);
            border-radius: 12px;
            pointer-events: auto;
        }
        #gameOverScreen { display: none; }
        .title {
            color: #ffd700;
            font-size: 42px;
            font-weight: bold;
            text-shadow: 3px 3px 6px rgba(0,0,0,0.7);
            margin-bottom: 10px;
        }
        .subtitle {
            color: #fff;
            font-size: 18px;
            margin-bottom: 30px;
            text-shadow: 1px 1px 3px rgba(0,0,0,0.5);
        }
        .btn {
            pointer-events: auto;
            background: linear-gradient(135deg, #ffd700, #ffaa00);
            color: #333;
            border: none;
            padding: 14px 40px;
            font-size: 20px;
            font-weight: bold;
            border-radius: 30px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 4px 15px rgba(255, 215, 0, 0.4);
        }
        .btn:hover {
            transform: scale(1.05);
            box-shadow: 0 6px 20px rgba(255, 215, 0, 0.6);
        }
        #finalScore {
            color: #ffd700;
            font-size: 36px;
            font-weight: bold;
            margin: 10px 0 20px;
        }
        .controls-hint {
            color: #ccc;
            font-size: 13px;
            margin-top: 15px;
        }
    </style>
</head>
<body>
    <div id="gameContainer">
        <canvas id="gameCanvas" width="900" height="500"></canvas>
        <div id="ui-overlay">
            <div id="score">Score: 0</div>
            <div id="highScore">Best: 0</div>
            <div id="startScreen">
                <div class="title">Banana Tennis Runner</div>
                <div class="subtitle">Run, jump & smash your way to victory!</div>
                <button class="btn" id="startBtn">Play</button>
                <div class="controls-hint">SPACE / UP to jump &bull; DOWN to slide &bull; SPACE (in air) to racket smash</div>
            </div>
            <div id="gameOverScreen">
                <div class="title">Game Over!</div>
                <div id="finalScore">0</div>
                <button class="btn" id="restartBtn">Play Again</button>
                <div class="controls-hint">Press SPACE to restart</div>
            </div>
        </div>
    </div>
    <script src="game.js"></script>
</body>
</html>
